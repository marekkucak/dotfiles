# ~/.tmux.conf — clean project cockpit

set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -sg escape-time 1
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g default-terminal "tmux-256color"

# Do NOT auto rename windows
setw -g allow-rename off
setw -g automatic-rename off

# Truecolor (WSL + Windows Terminal)
set -as terminal-features ',xterm-256color:RGB'
set -ag terminal-overrides ',xterm-256color:Tc'
set -ag terminal-overrides ',tmux-256color:Tc'

# Splits (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation (vim-ish)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# Copy to clipboard (WSL-friendly)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

# Continuum
set -g @continuum-restore 'off'

# Keep TPM last
run '~/.tmux/plugins/tpm/tpm'
